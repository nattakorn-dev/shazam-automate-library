name: Build and Push Docker Image

on:
  workflow_dispatch:

# สิทธิ์ในการยืนยันตัวตนเพื่อเขียน Package ลงบนคลังโปรเจกต์ของคุณ
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. ทำการล็อกอินเข้าสู่ระบบจัดเก็บอิมเมจของ GitHub (GHCR)
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 2. ตั้งค่าการตั้งชื่อและ Tag ของรูปภาพอัตโนมัติ (เช่น :latest และ :รหัส commit)
    - name: Extract Metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=raw,value=latest
          type=sha,format=short

    # 3. สั่งประกอบร่างและอัปโหลดข้ามไปเก็บไว้บนคลัง Cloud ทันที
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
